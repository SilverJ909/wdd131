<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Ticket</title>
  <link rel="icon" href="CapF.svg">
  <link rel="stylesheet" href="form.css" />
  <script src="form.js" defer></script>
</head>
<body>
  <main class="wrapper">
    <h1>Event Ticket</h1>

    <form id="eventForm">
      <div class="field">
        <label for="firstName">First Name</label>
        <input id="firstName" name="firstName" type="text" required />
      </div>

      <div class="field">
        <label for="lastName">Last Name</label>
        <input id="lastName" name="lastName" type="text" required />
      </div>

      <div class="field full">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="field">
        <label for="type">Type</label>
        <select
          id="type"
          name="type"
          aria-controls="select type of patron"
          required
        >
          <option value="">Choose one</option>
          <option value="student">Student</option>
          <option value="guest">Guest</option>
        </select>
      </div>

      <div class="field">
        <label for="eventDate">Event Date</label>
        <input id="eventDate" name="eventDate" type="date" required />
      </div>

      <div id="idContainer" class="field full" hidden>
        <label id="idName" for="idTitle"></label>
        <input id="idTitle" name="idTitle" type="text" />
      </div>

      <button class="full" type="submit">Create Ticket</button>
    </form>

    <section id="output" aria-live="polite">
    </section>
  </main>
</body>
</html>
